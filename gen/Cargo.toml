[package]
name = "cartel-gen"
version.workspace = true
edition.workspace = true
description = "Procedural macros for cartel"
license.workspace = true
repository.workspace = true
authors.workspace = true

[lib]
proc-macro = true

[dependencies]
proc-macro2 = "1"
quote = "1"
syn = { version = "3", features = ["full", "extra-traits", "visit", "visit-mut"] }

[dev-dependencies]
cartel-core.workspace = true
dope.workspace = true
pin-project.workspace = true
