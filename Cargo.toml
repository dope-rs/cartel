[workspace]
resolver = "2"
members = ["core", "gen", "pg", "redis", "sqlite"]

[workspace.package]
edition = "2024"
version = "0.6.0"
license = "MIT"
repository = "https://github.com/dope-rs/cartel"
authors = ["inq <gofiri@gmail.com>"]

[workspace.dependencies]
dope = { path = "../dope/dope", version = "0.9.0" }
dope-fiber = { path = "../dope/fiber", version = "0.9.0" }
dope-gen = { path = "../dope/gen", version = "0.9.0" }
dope-extra = { path = "../dope/extra", version = "0.9.0" }
dope-net = { path = "../dope/net", version = "0.9.0" }
o3 = "0.6"
pin-project = "1"
ryu = "1"
cartel-core = { path = "core", version = "0.6.0" }
cartel-gen = { path = "gen", version = "0.6.0" }
cartel-pg = { path = "pg", version = "0.6.0" }
